<div [ngClass]="['rounded-2xl p-6 flex items-center justify-between shadow-sm border', bgClass]">
  <div>
    <p class="text-sm font-medium text-gray-500 mb-1">{{ title }}</p>
    <h3 [ngClass]="['text-3xl font-bold', textClass]">{{ value }}</h3>
  </div>
  <div [ngClass]="['w-12 h-12 rounded-full flex items-center justify-center shadow-sm', iconClass]">
    <lucide-icon *ngIf="icon" [img]="icon" class="w-6 h-6"></lucide-icon>
    <ng-content *ngIf="!icon"></ng-content>
  </div>
</div>
